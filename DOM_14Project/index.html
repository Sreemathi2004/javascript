<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BookSky</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar">
        <h1>BookSky</h1>
    </div>

    <div class="container">
        <div class="book-container">
            <h2>Rich Dad poor Dad</h2>
            <h5>Robert</h5>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ad omnis error magnam quas perferendis dolorum distinctio laborum dicta, ea ex quod nihil itaque. Autem maiores illo vitae. Quidem, rerum tempora?</p>
            <button onclick="deleteContent(event)">Delete</button>
        </div>
    </div>

    <div class="popup-overlay">
    </div>

    <div class="popup-box">
        <h2>Add Book</h2>
        <form action="">
            <input type="text" name="" id="book-title-input" placeholder="Book Title">
            <input type="text" name="" id="book-author-input" placeholder="Book Author">
            <textarea name="" id="book-description-input" cols="30" rows="10" placeholder="short description"></textarea>
            <button id="add-book">Add</button>
            <button id="cancel-popup">Cancel</button>
        </form>
    </div>
    <button class="add-button" id="add-popup-button">+</button>
    <script src="script.js"></script>
</body>
</html>
