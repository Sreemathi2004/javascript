<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>
</head>
<body>
    <Button onclick="add()">Add Hello</Button>
    <div id="container"></div>
    <script>
         var con=document.getElementById("container");
        function add(){
           var head=document.createElement("h1");//<h1></h1>
           head.textContent="Hello";//<h1> Hello </h1>
           con.append(head);
        }
    </script>
</body>
</html>
