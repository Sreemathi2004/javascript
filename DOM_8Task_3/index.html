<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task3</title>
</head>
<body>
    <button id="color" onclick="change()" >Change color</button>
    <script>
        var box=document.getElementById("color");
        function change(){
                box.style.backgroundColor="red";
        }
    </script>
</body>
