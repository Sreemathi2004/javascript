<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>

    <style>
        *{
            background-color: #944E63;
            color:#FFE7E7;
           
            
        }
        button{
            background: #B47B84;
            width: 100px;
            height: 30px;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 1.5px 0.5px;
        }
        input{
            width: 300px;
            height: 50px;
            border-radius: 50px;
            font-size: 20px;
        }
       li{
        font-size: 20px;
       }
    </style>
</head>
<body>
    <h1>TO DO LIST</h1>
    <input type="text" id="input">
    <button id="add" onclick="adds()">add</button>
    <ul id="list-content">
        <li>
            Hello 
            <button id="delete" onclick="deletes(event)">delete</button>
        </li>
    </ul>

    <script>
        var contents=document.getElementById("input");
        var l=document.getElementById("list-content");
        function adds(){
            var list=document.createElement("li");
            list.innerHTML=contents.value+"<button onclick='deletes(event)'>delete</button>";
            l.append(list);
        }
            function deletes(event){
                    event.target.parentElement.remove();
            }
    </script>
</body>
</html>
