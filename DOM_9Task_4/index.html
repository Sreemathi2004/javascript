<html lang="en">
<head>

</head>
<body>
   <h1 id="content">Name</h1>
   <button onclick="call(event)">Sree</button>
   <button onclick="call(event)">Ravi</button>
   <button onclick="call(event)">Hari</button>

   <script>
    var v1=document.getElementById("content");
    function call(event){
        v1.textContent=event.target.textContent;
    }
   </script>
</body>
